# .github/workflows/ci.yml
name: Frontend CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4    
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Linter
        run: npm run lint || echo "No lint script found"

      - name: Run Unit Tests
        run: npm test || echo "No tests configured"

  build:
    needs: test
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4    
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true 
          platforms: linux/amd64,linux/arm64
          tags: |
            zhaoxinmei/tasksphere-frontend:v0.0.${{ github.run_number }}
            zhaoxinmei/tasksphere-frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << "EOF"
            set -e
            
            # 1. 拉取前端新镜像
            sudo docker pull zhaoxinmei/tasksphere-frontend:latest
            
            # 2. 停止并移除旧容器（如果存在）
            sudo docker rm -f frontend_app || true
            
            # 3. 启动前端容器
            # 将宿主机的 80 端口映射到容器的 5173 端口
            sudo docker run -d \
              --name frontend_app \
              --network app_net \
              -p 80:5173 \
              zhaoxinmei/tasksphere-frontend:latest
            
            # 4. 清理旧镜像以释放空间
            sudo docker image prune -f
          EOF
          
